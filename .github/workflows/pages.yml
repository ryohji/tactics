# GitHub Pages デプロイ。main への push で vite build → Pages 公開。
# base はリポジトリ名から導出する(https://<owner>.github.io/<repo>/ 配下で動かすため)。
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # アクションは Node 24 ランタイム世代のメジャーに揃える(Node 20 系は非推奨警告が出る)。
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # 共有スコアボード(rogue-26)の送信先。公開 URL(クライアントに埋まる値)なので
      # Secrets ではなく平文でよい。空にするとスコアボード機能ごと無効化される。
      - run: npx vite build --base=/${{ github.event.repository.name }}/
        env:
          VITE_SCOREBOARD_URL: https://fcc-rogue-scoreboard.ryohji.workers.dev
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
